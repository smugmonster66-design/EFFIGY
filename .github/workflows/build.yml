name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  macos:
    name: macOS (VST3 + AU + pkg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake/Ninja
        run: |
          brew install ninja || true
          cmake --version

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --config Release --parallel 3

      - name: Package .pkg + zip
        run: |
          chmod +x packaging/build_pkg.sh
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="1.0.0"
          case "$VERSION" in refs/*|main) VERSION="1.0.0";; esac
          bash packaging/build_pkg.sh "$VERSION" build dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EFFIGY-macOS
          path: dist/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
